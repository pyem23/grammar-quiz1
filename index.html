<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Quiz - Level 1</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app"></div>
    
    <!-- Load quiz data first -->
    <script>
        let quizData = {};
        fetch('data/quiz-data.json')
            .then(response => response.json())
            .then(data => {
                quizData = data;
                // Script will be ready once data is loaded
                const script = document.createElement('script');
                script.src = 'js/app.js';
                document.body.appendChild(script);
            })
            .catch(error => {
                console.error('Error loading quiz data:', error);
                document.getElementById('app').innerHTML = '<div style="padding: 20px; color: red;">Error loading quiz data. Please refresh the page.</div>';
            });
    </script>
</body>
</html>
