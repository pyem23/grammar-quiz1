<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Quiz - Level 1</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app"></div>
    
    <script>
        console.log('=== LOADING QUIZ APP ===');
        
        window.quizData = {};
        document.getElementById('app').innerHTML = '<div style="padding: 20px; text-align: center;"><h2>⏳ Loading...</h2></div>';
        
        async function initializeApp() {
            try {
                console.log('Fetching quiz data...');
                const response = await fetch('data/quiz-data.json');
                console.log('Response status:', response.status);
                
                if (!response.ok) throw new Error('HTTP ' + response.status);
                
                window.quizData = await response.json();
                console.log('Quiz data loaded. Topics:', window.quizData.topics.length);
                
                const script = document.createElement('script');
                script.src = 'js/app.js';
                document.body.appendChild(script);
                
            } catch (error) {
                console.error('ERROR:', error);
                document.getElementById('app').innerHTML = '<div style="padding: 40px; color: red; font-family: Arial; text-align: center;"><h2>❌ Error: ' + error.message + '</h2><p>Check console (F12) for details</p></div>';
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
</body>
</html>
