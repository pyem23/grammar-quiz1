<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Quiz - Level 1</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app"></div>
    
    <!-- Load quiz data first -->
    <script>
        window.quizData = {};
        
        async function initializeApp() {
            try {
                // Try to load quiz data from different paths
                let response;
                const paths = ['data/quiz-data.json', 'quiz-data.json', './data/quiz-data.json'];
                
                for (let path of paths) {
                    try {
                        response = await fetch(path);
                        if (response.ok) {
                            window.quizData = await response.json();
                            console.log('✓ Quiz data loaded from:', path);
                            break;
                        }
                    } catch (e) {
                        console.log('✗ Failed to load from:', path);
                    }
                }
                
                if (!window.quizData.topics) {
                    throw new Error('Quiz data structure invalid');
                }
                
                // Load app script after data is ready
                const script = document.createElement('script');
                script.src = 'js/app.js';
                script.onload = () => {
                    console.log('✓ App script loaded successfully');
                };
                script.onerror = () => {
                    console.error('✗ Failed to load app.js');
                    document.getElementById('app').innerHTML = '<div style="padding: 20px; color: red; font-family: Arial;"><h2>❌ Error</h2><p>Failed to load app.js</p></div>';
                };
                document.body.appendChild(script);
                
            } catch (error) {
                console.error('✗ Error during initialization:', error);
                document.getElementById('app').innerHTML = `
                    <div style="padding: 40px; color: red; font-family: Arial; text-align: center;">
                        <h2>❌ Error Loading Application</h2>
                        <p>${error.message}</p>
                        <p style="color: #666; font-size: 12px; margin-top: 20px;">
                            Make sure all files are in the correct folders:<br>
                            - css/styles.css<br>
                            - js/app.js<br>
                            - data/quiz-data.json
                        </p>
                        <button onclick="location.reload()" style="padding: 10px 20px; margin-top: 20px; font-size: 14px; cursor: pointer; background: #6366f1; color: white; border: none; border-radius: 4px;">
                            🔄 Refresh Page
                        </button>
                    </div>
                `;
            }
        }
        
        // Start loading when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
</body>
</html>
