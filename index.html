<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Quiz - Level 1</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app"></div>
    
    <script>
        window.quizData = {};
        
        async function loadApp() {
            try {
                const response = await fetch('data/quiz-data.json');
                if (!response.ok) throw new Error('Failed to load quiz data');
                window.quizData = await response.json();
                
                const script = document.createElement('script');
                script.src = 'js/app.js';
                document.body.appendChild(script);
            } catch (error) {
                console.error(error);
                document.getElementById('app').innerHTML = '<div style="padding: 40px; color: red; text-align: center;"><h2>❌ Error Loading Data</h2><p>' + error.message + '</p></div>';
            }
        }
        
        loadApp();
    </script>
</body>
</html>
